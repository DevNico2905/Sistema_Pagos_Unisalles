#ACABA ACÁ

spring.h2.console.enabled=false
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pagos_universidad}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:DataBase0503*}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true

# ===== Spring Actuator - Monitoreo y Seguimiento =====
management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Info del servicio
management.info.env.enabled=true
info.app.name=Sistema de Pagos Academicos Unisalle
info.app.description=Servicio SOA para la gestion de pagos de matricula
info.app.version=1.0.0
info.app.team=Caicedo - Charry - Bernal

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html